services:
  af-api:
    image: harbor.infra.cluster.ionos.com/imagefactory/af-api:build-20260515143318
    restart: unless-stopped
    environment:
      - DEV_MODE=true
    networks:
      - internal

  af-poc:
    build: .
    restart: unless-stopped
    environment:
      - AF_API_URL=http://af-api:8000/api/v1
      - AF_FRONTEND_URL=${AF_FRONTEND_URL:-https://frontendspace.duckdns.org}
    depends_on:
      af-api:
        condition: service_healthy
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - af-poc

networks:
  internal:

volumes:
  caddy_data:
  caddy_config:
